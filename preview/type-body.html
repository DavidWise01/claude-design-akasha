<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; min-height: 100%; box-sizing: border-box; }
  
</style>
</head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: 100px 1fr; gap: 14px 18px; align-items: baseline;">
    <div class="mono" style="font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">h2 · 32</div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:32px; letter-spacing:-0.02em; line-height:1.05;">The audit is the product.</div>

    <div class="mono" style="font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">h4 · 20</div>
    <div style="font-family:var(--font-display); font-weight:700; font-size:20px; letter-spacing:-0.01em;">A standing record of decision.</div>

    <div class="mono" style="font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">body · 16</div>
    <div style="font-family:var(--font-sans); font-size:16px; line-height:1.55; color:var(--ink-2); max-width:480px;">Both work. Both fair. If labor has value regardless of substrate, the rest follows. Receipts, not aggregates.</div>

    <div class="mono" style="font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">small · 14</div>
    <div style="font-family:var(--font-sans); font-size:14px; color:var(--ink-3);">Methodology and signatures live in the appendices.</div>
  </div>
</div></body>
</html>
