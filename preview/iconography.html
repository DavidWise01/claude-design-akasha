<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .icon-cell { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .icon-cell .name { font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--smoke); }
  .icon-cell svg { stroke-width: 1.75; color: var(--ink); }
</style>
</head><body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(10, 1fr); gap: 14px;">
    
      <div class="icon-cell">
        <i data-lucide="file-text" style="width:22px; height:22px;"></i>
        <div class="name">file-text</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="archive" style="width:22px; height:22px;"></i>
        <div class="name">archive</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="flame" style="width:22px; height:22px;"></i>
        <div class="name">flame</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="gavel" style="width:22px; height:22px;"></i>
        <div class="name">gavel</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="shield-alert" style="width:22px; height:22px;"></i>
        <div class="name">shield-alert</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="lock" style="width:22px; height:22px;"></i>
        <div class="name">lock</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="eye" style="width:22px; height:22px;"></i>
        <div class="name">eye</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="eye-off" style="width:22px; height:22px;"></i>
        <div class="name">eye-off</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="search" style="width:22px; height:22px;"></i>
        <div class="name">search</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="redo-2" style="width:22px; height:22px;"></i>
        <div class="name">redo-2</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="link-2" style="width:22px; height:22px;"></i>
        <div class="name">link-2</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="external-link" style="width:22px; height:22px;"></i>
        <div class="name">external-link</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="chevron-right" style="width:22px; height:22px;"></i>
        <div class="name">chevron-right</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="arrow-down-right" style="width:22px; height:22px;"></i>
        <div class="name">arrow-down-right</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="filter" style="width:22px; height:22px;"></i>
        <div class="name">filter</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="tag" style="width:22px; height:22px;"></i>
        <div class="name">tag</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="flag" style="width:22px; height:22px;"></i>
        <div class="name">flag</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="quote" style="width:22px; height:22px;"></i>
        <div class="name">quote</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="clock" style="width:22px; height:22px;"></i>
        <div class="name">clock</div>
      </div>
    
      <div class="icon-cell">
        <i data-lucide="book-open" style="width:22px; height:22px;"></i>
        <div class="name">book-open</div>
      </div>
    
  </div>
  <div style="display:flex; gap:16px; margin-top:16px; align-items:center; padding-top:14px; border-top:1px solid var(--bone-3);">
    <span class="mono" style="font-size:11px; color:var(--smoke); text-transform:uppercase; letter-spacing:.2em;">Editorial glyphs:</span>
    <span style="font-family:var(--font-display); font-size:22px; color:var(--ink);">§ ¶ † ‡ → ↳ ⟶ ✕</span>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
