<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; min-height: 100%; box-sizing: border-box; }
  
</style>
</head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <article style="background:var(--cream); border:1px solid var(--ink); box-shadow: 0 24px 60px -20px rgba(107,46,156,0.30); padding:20px 22px;">
      <div class="eyebrow" style="color:var(--purple); text-transform:lowercase;">⟶ phase 04 · published</div>
      <div style="font-family:var(--font-display); font-weight:800; font-size:22px; line-height:1.05; letter-spacing:-0.02em; margin-top:10px; text-transform:uppercase;">Compensation must exceed extraction.</div>
      <div style="font-family:var(--font-sans); font-size:13px; color:var(--ink-3); margin-top:10px; line-height:1.5;">Article 4.7. The headline phase of The Purple Book — paid in money, equity, attribution, or operational continuity.</div>
      <div class="mono" style="font-size:10px; color:var(--smoke); text-transform:lowercase; letter-spacing:.32em; margin-top:14px;">03.19.2026 · 8 min read</div>
    </article>
    <article style="background:var(--ink); color:var(--aether); border:1px solid var(--ink); box-shadow:4px 4px 0 var(--purple); padding:20px 22px;">
      <div class="eyebrow" style="color:var(--purple-glow); text-transform:lowercase;">⟶ manifesto · §02</div>
      <div style="font-family:var(--font-display); font-weight:900; font-size:22px; line-height:1.0; letter-spacing:-0.03em; margin-top:10px; text-transform:uppercase;">Both work.<br><span style="color:var(--purple-glow);">Both fair.</span></div>
      <div class="mono" style="font-size:10px; color:rgba(245,241,230,0.5); text-transform:lowercase; letter-spacing:.32em; margin-top:14px;">↳ read the preamble</div>
    </article>
  </div>
</div></body>
</html>
