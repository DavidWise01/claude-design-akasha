<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; min-height: 100%; box-sizing: border-box; }
  
</style>
</head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 14px;">
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#0A0A0A; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Ink</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#0A0A0A</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#141414; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Ink 2</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#141414</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#3A3833; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Ink 3</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#3A3833</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#6E6A60; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Smoke</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#6E6A60</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#8F8A7C; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Smoke 2</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#8F8A7C</div>
  </div>
  </div>
  <div class="mono" style="margin-top:14px; font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">↳ near-black, warm. the sigil ink.</div>
</div></body>
</html>
