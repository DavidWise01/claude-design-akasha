<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; min-height: 100%; box-sizing: border-box; }
  
</style>
</head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 14px;">
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#2E1244; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Purple Deep</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#2E1244</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#4A2168; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Purple</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#4A2168</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#6B2E9C; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Purple Core</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#6B2E9C</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#8B5BB8; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Purple Mid</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#8B5BB8</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#B070E0; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Purple Glow</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#B070E0</div>
  </div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 18px;">
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#B07F1E; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Ochre</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#B07F1E</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#3E4A28; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Moss</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#3E4A28</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#9C1F1E; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Alarm</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#9C1F1E</div>
  </div>
  </div>
  <div class="mono" style="margin-top:14px; font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">↳ purple is THE signal. ochre + moss accent. alarm is danger only.</div>
</div></body>
</html>
