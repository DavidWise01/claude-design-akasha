<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; min-height: 100%; box-sizing: border-box; }
  
</style>
</head>
<body><div class="card">
  <div style="display:flex; align-items:center; gap:32px;">
    <div style="flex-shrink:0;"><img src="../assets/chevron-orb.svg" style="display:block; width:120px; height:120px;" /></div>
    <div>
      <div style="font-family:var(--font-display); font-weight:900; font-size:34px; line-height:0.95; letter-spacing:-0.03em; color:var(--ink); text-transform:uppercase;">AKASHA</div>
      <div class="mono" style="font-size:11px; text-transform:lowercase; letter-spacing:.32em; color:var(--purple); margin-top:8px;">↳ a tripod publication · est. 2026</div>
    </div>
    <div style="flex:1; text-align:right;">
      <img src="../assets/akasha-sigil.svg" style="display:inline-block; width:52px; height:52px; vertical-align:middle;" />
      <span class="mono" style="margin-left:14px; font-size:10px; letter-spacing:.32em; color:var(--smoke); text-transform:lowercase;">sigil ·<br>secondary mark</span>
    </div>
  </div>
</div></body>
</html>
