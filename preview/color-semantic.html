<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; min-height: 100%; box-sizing: border-box; }
  
</style>
</head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px 28px;">
    
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; background:var(--fg-1); border:1px solid var(--ink);"></div>
        <div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px;">--fg-1</div>
          <div class="mono" style="font-size:11px; color:var(--smoke); text-transform:uppercase; letter-spacing:.16em;">semantic</div>
        </div>
      </div>
    
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; background:var(--fg-2); border:1px solid var(--ink);"></div>
        <div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px;">--fg-2</div>
          <div class="mono" style="font-size:11px; color:var(--smoke); text-transform:uppercase; letter-spacing:.16em;">semantic</div>
        </div>
      </div>
    
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; background:var(--fg-3); border:1px solid var(--ink);"></div>
        <div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px;">--fg-3</div>
          <div class="mono" style="font-size:11px; color:var(--smoke); text-transform:uppercase; letter-spacing:.16em;">semantic</div>
        </div>
      </div>
    
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; background:var(--fg-muted); border:1px solid var(--ink);"></div>
        <div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px;">--fg-muted</div>
          <div class="mono" style="font-size:11px; color:var(--smoke); text-transform:uppercase; letter-spacing:.16em;">semantic</div>
        </div>
      </div>
    
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; background:var(--status-info); border:1px solid var(--ink);"></div>
        <div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px;">--status-info</div>
          <div class="mono" style="font-size:11px; color:var(--smoke); text-transform:uppercase; letter-spacing:.16em;">semantic</div>
        </div>
      </div>
    
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; background:var(--status-warn); border:1px solid var(--ink);"></div>
        <div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px;">--status-warn</div>
          <div class="mono" style="font-size:11px; color:var(--smoke); text-transform:uppercase; letter-spacing:.16em;">semantic</div>
        </div>
      </div>
    
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; background:var(--status-ok); border:1px solid var(--ink);"></div>
        <div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px;">--status-ok</div>
          <div class="mono" style="font-size:11px; color:var(--smoke); text-transform:uppercase; letter-spacing:.16em;">semantic</div>
        </div>
      </div>
    
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; background:var(--status-danger); border:1px solid var(--ink);"></div>
        <div>
          <div style="font-family:var(--font-display); font-weight:700; font-size:14px;">--status-danger</div>
          <div class="mono" style="font-size:11px; color:var(--smoke); text-transform:uppercase; letter-spacing:.16em;">semantic</div>
        </div>
      </div>
    
  </div>
</div></body>
</html>
