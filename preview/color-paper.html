<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; min-height: 100%; box-sizing: border-box; }
  
</style>
</head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px;">
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#FAF6E9; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Cream</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#FAF6E9</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#F5F1E6; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Aether</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#F5F1E6</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#EDE7D6; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Aether 2</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#EDE7D6</div>
  </div>
    
  <div style="display:flex; flex-direction:column; gap:6px;">
    <div style="background:#E0D7BD; height:64px; border:1px solid var(--ink);"></div>
    <div style="font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:-0.01em; color:var(--ink);">Aether 3</div>
    <div class="mono" style="font-size:10px; color:var(--smoke); letter-spacing:.1em; text-transform:uppercase;">#E0D7BD</div>
  </div>
  </div>
  <div class="mono" style="margin-top:14px; font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">↳ the page is paper. never pure white.</div>
</div></body>
</html>
