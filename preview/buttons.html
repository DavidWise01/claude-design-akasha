<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; min-height: 100%; box-sizing: border-box; }
  
</style>
</head>
<body><div class="card">
  <div style="display:flex; flex-wrap:wrap; gap:14px; align-items:center;">

  </div>
  <div style="display:flex; gap:10px; margin-top:18px; align-items:center;">
    <a href="#" class="btn btn--sm btn--primary">Sign</a>
    <a href="#" class="btn btn--sm btn--purple">Fork</a>
    <a href="#" class="btn btn--sm">Cite</a>

</html>
