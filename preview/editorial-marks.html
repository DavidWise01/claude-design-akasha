<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>

</style>
</head>

  <div style="display:flex; flex-direction:column; gap:16px;">

    <div style="display:flex; gap:14px; align-items:center;">
      <div class="mono" style="font-size:11px; text-transform:lowercase; letter-spacing:.32em; color:var(--smoke);">§ 04</div>

      <div class="mono" style="font-size:11px; text-transform:lowercase; letter-spacing:.32em; color:var(--smoke);">page 04 / 14</div>
