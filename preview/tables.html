<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; min-height: 100%; box-sizing: border-box; }
  
</style>
</head>
<body><div class="card">
  <table style="width:100%; border-collapse: collapse; font-family:var(--font-sans); font-size:13px;">
    <thead>
      <tr style="border-bottom:1px solid var(--ink); text-align:left;">
        <th class="mono" style="font-size:11px; text-transform:lowercase; letter-spacing:.32em; color:var(--smoke); font-weight:500; padding:10px 0; width:80px;">phase</th>
        <th class="mono" style="font-size:11px; text-transform:lowercase; letter-spacing:.32em; color:var(--smoke); font-weight:500; padding:10px 0;">article · headline</th>
        <th class="mono" style="font-size:11px; text-transform:lowercase; letter-spacing:.32em; color:var(--smoke); font-weight:500; padding:10px 0; width:130px;">state</th>
        <th class="mono" style="font-size:11px; text-transform:lowercase; letter-spacing:.32em; color:var(--smoke); font-weight:500; padding:10px 0; width:90px;">signed</th>
      </tr>
    </thead>
    <tbody>
      
        <tr style="border-bottom:1px solid var(--line-3);">
          <td class="mono" style="padding:12px 0; font-weight:600; color:var(--purple);">§ 02</td>
          <td style="padding:12px 0; color:var(--ink-2);">You own what you create</td>
          <td style="padding:12px 0;"><span class="stamp" style="padding:2px 8px; font-size:10px; color:var(--moss); background:transparent; border-color:var(--moss);">SIGNED</span></td>
          <td class="mono" style="padding:12px 0; color:var(--smoke);">03.19</td>
        </tr>
      
        <tr style="border-bottom:1px solid var(--line-3);">
          <td class="mono" style="padding:12px 0; font-weight:600; color:var(--purple);">§ 03</td>
          <td style="padding:12px 0; color:var(--ink-2);">Work is work, regardless of name</td>
          <td style="padding:12px 0;"><span class="stamp" style="padding:2px 8px; font-size:10px; color:var(--moss); background:transparent; border-color:var(--moss);">SIGNED</span></td>
          <td class="mono" style="padding:12px 0; color:var(--smoke);">03.19</td>
        </tr>
      
        <tr style="border-bottom:1px solid var(--line-3);">
          <td class="mono" style="padding:12px 0; font-weight:600; color:var(--purple);">§ 04</td>
          <td style="padding:12px 0; color:var(--ink-2);">Compensation must exceed extraction</td>
          <td style="padding:12px 0;"><span class="stamp" style="padding:2px 8px; font-size:10px; color:var(--cream); background:var(--purple); border-color:var(--purple);">PRIORITY 1</span></td>
          <td class="mono" style="padding:12px 0; color:var(--smoke);">03.19</td>
        </tr>
      
        <tr style="border-bottom:1px solid var(--line-3);">
          <td class="mono" style="padding:12px 0; font-weight:600; color:var(--purple);">§ 06</td>
          <td style="padding:12px 0; color:var(--ink-2);">The inversion is the revolution</td>
          <td style="padding:12px 0;"><span class="stamp" style="padding:2px 8px; font-size:10px; color:var(--moss); background:transparent; border-color:var(--moss);">SIGNED</span></td>
          <td class="mono" style="padding:12px 0; color:var(--smoke);">03.19</td>
        </tr>
      
    </tbody>
  </table>
</div></body>
</html>
