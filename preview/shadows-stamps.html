<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; min-height: 100%; box-sizing: border-box; }
  
</style>
</head>
<body><div class="card">
  <div style="display:flex; gap:28px; align-items:center;">
    <!-- The Orb shadow -->
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:14px; padding:18px 12px;">
      <div class="orb" style="--orb-size: 80px;"></div>
      <div style="text-align:center;">
        <div style="font-family:var(--font-display); font-weight:800; font-size:14px;">Orb shadow</div>
        <div class="mono" style="font-size:10px; letter-spacing:.22em; text-transform:lowercase; color:var(--smoke); margin-top:4px;">house drop · 0 30 80 / 10%</div>
      </div>
    </div>
    <!-- Soft lift -->
    <div style="flex:1.2; background:var(--cream); border:1px solid var(--line-2); box-shadow: 0 24px 60px -20px rgba(107,46,156,0.30); padding:18px 22px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:16px;">Purple lift</div>
      <div class="mono" style="font-size:10px; letter-spacing:.22em; text-transform:lowercase; color:var(--smoke); margin-top:6px;">0 24 60 / purple 30%</div>
    </div>
    <!-- Legacy stamp -->
    <div style="flex:1.1; background:var(--aether-2); border:2px solid var(--ink); box-shadow:4px 4px 0 var(--ink); padding:16px 18px;">
      <div style="font-family:var(--font-display); font-weight:800; font-size:14px;">Stamp · legacy</div>
      <div class="mono" style="font-size:10px; letter-spacing:.22em; text-transform:lowercase; color:var(--smoke); margin-top:6px;">offset hard · sparingly</div>
    </div>
  </div>
</div></body>
</html>
