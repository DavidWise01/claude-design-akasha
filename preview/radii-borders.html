<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--bg-page); }
  .card { padding: 24px 28px; min-height: 100%; box-sizing: border-box; }
  
</style>
</head>
<body><div class="card">
  <div style="display:flex; gap:18px; align-items:flex-end;">
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:80px; height:64px; background:var(--aether-2); border:1px solid var(--ink); border-radius:0px; "></div>
        <div class="mono" style="font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">r-0</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:80px; height:64px; background:var(--aether-2); border:1px solid var(--ink); border-radius:2px; "></div>
        <div class="mono" style="font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">r-1</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:80px; height:64px; background:var(--aether-2); border:1px solid var(--ink); border-radius:4px; "></div>
        <div class="mono" style="font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">r-2</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:80px; height:64px; background:var(--ink); border:none; border-radius:50%; box-shadow: 0 12px 30px rgba(10,10,10,0.10);"></div>
        <div class="mono" style="font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">r-orb</div>
      </div>
    
    <div style="flex:1;"></div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      
        <div style="display:flex; align-items:center; gap:14px;">
          <div class="mono" style="width:60px; font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">bw-hair</div>
          <div style="height:1px; width:160px; background:var(--ink);"></div>
        </div>
      
        <div style="display:flex; align-items:center; gap:14px;">
          <div class="mono" style="width:60px; font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">bw-rule</div>
          <div style="height:2px; width:160px; background:var(--ink);"></div>
        </div>
      
        <div style="display:flex; align-items:center; gap:14px;">
          <div class="mono" style="width:60px; font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">bw-bold</div>
          <div style="height:3px; width:160px; background:var(--ink);"></div>
        </div>
      
        <div style="display:flex; align-items:center; gap:14px;">
          <div class="mono" style="width:60px; font-size:11px; letter-spacing:.32em; text-transform:lowercase; color:var(--smoke);">bw-slab</div>
          <div style="height:6px; width:160px; background:var(--ink);"></div>
        </div>
      
    </div>
  </div>
</div></body>
</html>
